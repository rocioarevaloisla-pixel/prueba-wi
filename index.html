<!DOCTYPE>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Estación Arcade </title>
    <link rel="stylesheet" href="juegos.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">
</head>
<body>
    <header>
        <div class="logo"> Estación Arcade</div>
    </header>
    <div class="container">

        <h2 class="section-title">Mejores Juegos</h2>
       <div class="video-container">
            <div class="video-slot">
                <video src="pagina/videos/trailer.mp4" alt="re2" controls>
                </video>
            </div>
            <div class="video-slot">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/fuWcn9JsWUw?si=j7kx0UcsTLZM3qcx" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            <div class="video-slot">
                <video src="pagina/videos/trailerrival.mp4" alt="marvel rivals" controls>
                </video>
        </div>
    </div>
    
        <h2 class="section-title">Juegos del Mes</h2>
        <div class="games-grid">
            <div class="game-card">
                <img src="img/re2.jpg" alt="re2" class ="game-image">
                <div class="game-info">
                    <div class="game-title">Resident Evil 2</div>
                    <div class="game-price">$27.600</div>
                    <button class="game-button">Agregar al carro</button>
                </div>
            </div>
            <div class="game-card">
                <img src="img/breakout.jpg" alt="breakout" class ="game-image">
                <div class="game-info">
                    <div class="game-title"> Arena Breakout</div>
                    <div class="game-price">Gratis</div>
                    <button class="game-button">Agregar al carro</button>
                </div>
            </div>
            <div class="game-card">
                <img src="img/rivals.jpg" alt="marvel rivals" class ="game-image">
                <div class="game-info">
                    <div class="game-title">Marvel Rivals</div>
                    <div class="game-price">Gratis</div>
                    <button class="game-button">Agregar al carro</button>
                </div>
            </div>

        </div>
         <div class="formulario">
    <form id="formularioContacto" class="contact-form" action="thx.html" method="GET">
    <h2 class="section-title">Formulario de contacto</h2>

    <div>
        <input type="text" name="nombre" placeholder="Nombre" required minlength="2">
        <div id="errorNombre" class="error-message"></div>
    </div>

    <div>
        <input type="text" name="apellido" placeholder="Apellido" required minlength="2">
        <div id="errorApellido" class="error-message"></div>
    </div>

    <div>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <div id="errorEmail" class="error-message"></div>
    </div>

    <div>
        <textarea name="mensaje" placeholder="Escribe tu mensaje..." required minlength="5"></textarea>
        <div id="errorMensaje" class="error-message"></div>
    </div>

    <button type="submit">Enviar</button>
</form>
    </div>
</body>
<footer>
        <p>&copy; 2026 Estación Arcade. Todos los derechos reservados.</p>
    </footer>
</html>
